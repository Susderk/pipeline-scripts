# EVENING-Config: Vorabend-Block (manuelle Phase Step 01-06)
# Wird via: python Start_Scripts.py --evening [--target-date=YYYY-MM-DD]
# bzw. via Start_Evening.bat / Start_Evening_GUI.py aktiviert.
#
# Ablauf:
#   Step 01 → Prompts & Tagesordner
#   Step 01b → Notion Theme (Knorko, optional je nach product_types)
#   Step 02 → Marketing CSV + Plattform-Listings
#   Step 03 → Marketing Ordner
#   Step 04 → Bilder generieren (Leonardo)
#   Step 05 → Bilder umbenennen + Originale zu GitHub hochladen
#   Step 06 → Sichtkontrolle (Lock-Datei → Cowork-Mockup-Task → ENTER → Lock löschen)
#
# Endet sauber an REVIEW_PENDING.lock (Lock-Datei vom Nutzer manuell zu löschen
# nach Cowork-Mockup-Task; ENTER-Pause schließt Step 06 ab).

